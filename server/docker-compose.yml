services:
  mole-server:
    image: ${MOLE_IMAGE:-mole-server:latest}
    container_name: mole-server
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${MOLE_CONTROL_PORT:-9000}:${MOLE_CONTROL_PORT:-9000}/tcp"
      - "${MOLE_MANAGEMENT_PORT:-9001}:${MOLE_MANAGEMENT_PORT:-9001}/tcp"
      - "${MOLE_TUNNEL_PORT_MIN:-10000}-${MOLE_TUNNEL_PORT_MAX:-10100}:${MOLE_TUNNEL_PORT_MIN:-10000}-${MOLE_TUNNEL_PORT_MAX:-10100}/tcp"
      - "${MOLE_TUNNEL_PORT_MIN:-10000}-${MOLE_TUNNEL_PORT_MAX:-10100}:${MOLE_TUNNEL_PORT_MIN:-10000}-${MOLE_TUNNEL_PORT_MAX:-10100}/udp"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
